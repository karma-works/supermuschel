name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write  # needed for release uploads

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Fix node-pty execute bit (Bun strips +x from native binaries)
        run: |
          find node_modules -path "*/node-pty/prebuilds/darwin-*/spawn-helper" -exec chmod +x {} \;

      - name: Install Python setuptools (distutils removed in Python 3.12+)
        run: pip3 install --break-system-packages setuptools

      - name: Rebuild native modules
        run: cd apps/desktop && bun run rebuild

      - name: Create icon.icns from SVG
        run: |
          brew install librsvg
          mkdir -p apps/desktop/resources/icon.iconset
          for size in 16 32 64 128 256 512; do
            rsvg-convert -w $size -h $size resources/icon.svg \
              -o apps/desktop/resources/icon.iconset/icon_${size}x${size}.png
            rsvg-convert -w $((size*2)) -h $((size*2)) resources/icon.svg \
              -o apps/desktop/resources/icon.iconset/icon_${size}x${size}@2x.png
          done
          iconutil -c icns apps/desktop/resources/icon.iconset \
            -o apps/desktop/resources/icon.icns

      # ── DMG (electron-builder mac target builds arm64 + x64 in one pass) ────────

      - name: Build CLI (arm64)
        run: |
          cd tools/supermuschel-cli
          bun build --compile src/main.ts \
            --outfile ../../apps/desktop/resources/bin/supermuschel \
            --target bun-darwin-arm64
          chmod +x ../../apps/desktop/resources/bin/supermuschel

      - name: Build Electron app
        run: cd apps/desktop && bun run build

      - name: Package DMGs (arm64 + x64)
        run: cd apps/desktop && bunx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"  # skip code signing

      # ── Upload artifacts ──────────────────────────────────────────────────────

      - name: Upload DMGs
        uses: actions/upload-artifact@v4
        with:
          name: dmg
          path: apps/desktop/dist-app/*.dmg
          if-no-files-found: error

