appId: dev.supermuschel.app
productName: Supermuschel
directories:
  output: release
files:
  - out/**
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  icon: resources/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
nsis:
  oneClick: false
publish:
  provider: github
  owner: supermuschel
  repo: supermuschel
