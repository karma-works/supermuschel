appId: dev.supermuschel.app
productName: Supermuschel
directories:
  output: release
files:
  - out/**
extraResources:
  - from: resources/bin/
    to: bin/
    filter:
      - supermuschel
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
  icon: resources/icon.icns
  bundleVersion: "1"
  minimumSystemVersion: "14.0"
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
publish:
  provider: github
  owner: karma-works
  repo: supermuschel
